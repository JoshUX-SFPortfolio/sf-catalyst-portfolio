# Workflow 2 — Develop Integration
# Trigger: push to the develop branch
# Purpose: confirm the integrated state of develop is always deployable
#
# Required GitHub Repository Secrets:
#   SF_CLIENT_ID     — Connected App consumer key
#   SF_USERNAME      — Salesforce username for the CI user
#   SF_SERVER_KEY    — Raw PEM private key text (-----BEGIN ... PRIVATE KEY-----)
#   SF_INSTANCE_URL  — Target org login URL
#
# Required GitHub Repository Variable:
#   CI_SCRATCH_MODE  — stabilize (default) or full

name: Develop Integration

on:
  push:
    branches: [develop]

concurrency:
  group: develop-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrate:
    name: Integration — Deploy & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install SF CLI
        run: npm install --global @salesforce/cli@latest

      - name: Preflight required secrets
        env:
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_SERVER_KEY: ${{ secrets.SF_SERVER_KEY }}
        run: |
          set -euo pipefail
          REQUIRED=(SF_CLIENT_ID SF_USERNAME SF_INSTANCE_URL SF_SERVER_KEY)
          for var in "${REQUIRED[@]}"; do
            if [ -z "${!var:-}" ]; then
              echo "FAIL: Missing required repository secret: ${var}"
              exit 1
            fi
          done
          echo "PASS: Required secrets are present."

      - name: JWT authenticate to Salesforce
        env:
          SF_CLIENT_ID: ${{ secrets.SF_CLIENT_ID }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SF_SERVER_KEY: ${{ secrets.SF_SERVER_KEY }}
        run: |
          set -euo pipefail
          printf '%s\n' "$SF_SERVER_KEY" > server.key
          chmod 600 server.key
          openssl pkey -in server.key -noout
          sf org login jwt \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file server.key \
            --username "$SF_USERNAME" \
            --instance-url "$SF_INSTANCE_URL" \
            --alias ci-org --set-default-dev-hub

      - name: Auth health probe (SOAP metadata API)
        run: |
          set -euo pipefail
          sf force mdapi listmetadata \
            --metadata-type ApexClass \
            --target-org ci-org \
            >/dev/null

      - name: Resolve scratch mode and daily quota
        id: scratch_gate
        env:
          CI_SCRATCH_MODE: ${{ vars.CI_SCRATCH_MODE }}
        run: |
          set -euo pipefail
          mkdir -p ci-status
          MODE_RAW="${CI_SCRATCH_MODE:-stabilize}"
          MODE=$(printf '%s' "$MODE_RAW" | tr '[:upper:]' '[:lower:]')
          case "$MODE" in
            stabilize|full) ;;
            *)
              echo "WARN: Unsupported CI_SCRATCH_MODE='${MODE_RAW}'. Defaulting to stabilize."
              MODE="stabilize"
              ;;
          esac

          LIMITS_JSON="$(sf limits api display --target-org ci-org --json || true)"
          REMAINING="$(printf '%s' "$LIMITS_JSON" | jq -r '.result[]? | select(.name=="DailyScratchOrgs") | .remaining' | head -n1)"
          if ! [[ "$REMAINING" =~ ^[0-9]+$ ]]; then
            REMAINING="unknown"
          fi

          SHOULD_CREATE="false"
          REASON="stabilization_mode"
          if [ "$MODE" = "full" ]; then
            if [ "$REMAINING" = "unknown" ]; then
              REASON="quota_probe_unavailable"
            elif [ "$REMAINING" -gt 0 ]; then
              SHOULD_CREATE="true"
              REASON="scratch_enabled"
            else
              REASON="daily_quota_exhausted"
            fi
          fi

          {
            echo "mode=$MODE"
            echo "quota_remaining=$REMAINING"
            echo "should_create_scratch=$SHOULD_CREATE"
            echo "reason=$REASON"
          } >> "$GITHUB_OUTPUT"

          {
            echo "Workflow mode: $MODE"
            echo "DailyScratchOrgs remaining: $REMAINING"
            echo "Scratch stages enabled: $SHOULD_CREATE"
            echo "Reason: $REASON"
          } > ci-status/mode-summary.txt

      - name: Scratch stage decision
        if: steps.scratch_gate.outputs.should_create_scratch != 'true'
        run: cat ci-status/mode-summary.txt

      - name: Create scratch org
        if: steps.scratch_gate.outputs.should_create_scratch == 'true'
        run: |
          sf org create scratch \
            --definition-file config/project-scratch-def.json \
            --alias ci-develop-scratch \
            --duration-days 1 \
            --wait 15 \
            --target-dev-hub ci-org

      - name: Deploy metadata
        if: steps.scratch_gate.outputs.should_create_scratch == 'true'
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org ci-develop-scratch \
            --wait 20

      - name: Run Apex tests with coverage
        if: steps.scratch_gate.outputs.should_create_scratch == 'true'
        run: |
          mkdir -p test-results
          sf apex run test \
            --target-org ci-develop-scratch \
            --code-coverage \
            --result-format json \
            --wait 15 \
            --output-dir test-results \
            > test-results/test-output.json || true

      - name: Assert coverage >= 85%
        if: steps.scratch_gate.outputs.should_create_scratch == 'true'
        run: |
          set -euo pipefail
          COVERAGE=$(jq -r '.result.summary.orgWideCoverage // "0%"' test-results/test-output.json | tr -d '%')
          PASS_COUNT=$(jq -r '.result.summary.passing // 0' test-results/test-output.json)
          FAIL_COUNT=$(jq -r '.result.summary.failing // 0' test-results/test-output.json)
          echo "Apex tests: ${PASS_COUNT} passed, ${FAIL_COUNT} failed"
          echo "Org-wide coverage: ${COVERAGE}%"
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "FAIL: ${FAIL_COUNT} Apex test(s) failed."
            exit 1
          fi
          if awk "BEGIN {exit !($COVERAGE < 85)}"; then
            echo "FAIL: Coverage ${COVERAGE}% is below the 85% threshold."
            exit 1
          fi
          echo "PASS: All tests passing, coverage ${COVERAGE}% meets the 85% threshold."

      - name: Upload test results
        if: always() && steps.scratch_gate.outputs.should_create_scratch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apex-test-results-develop
          path: test-results/

      - name: Upload mode summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-mode-summary-develop
          path: ci-status/

      - name: Delete scratch org
        if: always()
        run: |
          if sf org display --target-org ci-develop-scratch >/dev/null 2>&1; then
            sf org delete scratch --target-org ci-develop-scratch --no-prompt || true
          else
            echo "Scratch org alias ci-develop-scratch not found; skipping delete."
          fi
          rm -f server.key
