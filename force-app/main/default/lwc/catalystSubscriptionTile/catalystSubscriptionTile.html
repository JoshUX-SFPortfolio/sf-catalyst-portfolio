<template>
    <lightning-card title="Subscription" icon-name="standard:contract">
        <div class="slds-p-around_medium catalyst-subscription-tile">

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading subscription" size="small"></lightning-spinner>
            </template>

            <template if:true={account}>
                <!-- Tier Badge -->
                <div class="slds-m-bottom_medium slds-text-align_center">
                    <span class={tierBadgeClass}>
                        {account.Subscription_Tier__c}
                    </span>
                </div>

                <dl class="slds-dl_horizontal">
                    <dt class="slds-dl_horizontal__label">Annual Contract Value</dt>
                    <dd class="slds-dl_horizontal__detail">
                        <lightning-formatted-number
                            value={account.Annual_Contract_Value__c}
                            format-style="currency"
                            currency-code="USD">
                        </lightning-formatted-number>
                    </dd>

                    <dt class="slds-dl_horizontal__label">Renewal Date</dt>
                    <dd class="slds-dl_horizontal__detail">
                        <lightning-formatted-date-time
                            value={renewalDateIso}
                            year="numeric" month="long" day="2-digit">
                        </lightning-formatted-date-time>
                        <template if:true={isRenewalSoon}>
                            <lightning-icon
                                icon-name="utility:warning"
                                size="x-small"
                                variant="warning"
                                alternative-text="Renewal within 90 days"
                                class="slds-m-left_x-small"
                                title="Renewal within 90 days">
                            </lightning-icon>
                        </template>
                    </dd>

                    <dt class="slds-dl_horizontal__label">Health Score</dt>
                    <dd class="slds-dl_horizontal__detail">
                        <span class={healthScoreClass}>{account.Health_Score__c}</span>
                        / 100
                    </dd>
                </dl>

                <div class="slds-m-top_medium slds-text-align_right">
                    <lightning-button
                        label="View Subscription Details"
                        variant="base"
                        onclick={handleViewSubscription}>
                    </lightning-button>
                </div>
            </template>

            <template if:true={noData}>
                <p class="slds-text-body_small slds-text-color_weak">Subscription data unavailable.</p>
            </template>
        </div>
    </lightning-card>
</template>
