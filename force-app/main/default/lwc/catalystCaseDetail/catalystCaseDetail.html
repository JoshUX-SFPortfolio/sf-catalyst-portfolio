<template>
    <div class="catalyst-case-detail">

        <!-- Loading -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading case" size="medium"></lightning-spinner>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <h2>{error}</h2>
            </div>
        </template>

        <!-- Case Detail -->
        <template if:true={caseRecord}>
            <!-- Header -->
            <div class="slds-page-header slds-m-bottom_medium">
                <div class="slds-page-header__row">
                    <div class="slds-page-header__col-title">
                        <div class="slds-media">
                            <div class="slds-media__figure">
                                <lightning-icon icon-name="standard:case" size="small"></lightning-icon>
                            </div>
                            <div class="slds-media__body">
                                <p class="slds-page-header__name-title">
                                    <span>{caseRecord.CaseNumber}</span>
                                </p>
                                <h1 class="slds-page-header__title">{caseRecord.Subject}</h1>
                            </div>
                        </div>
                    </div>
                    <div class="slds-page-header__col-actions">
                        <lightning-button
                            label="Back to Cases"
                            icon-name="utility:back"
                            onclick={handleBack}>
                        </lightning-button>
                    </div>
                </div>
            </div>

            <div class="slds-grid slds-gutters slds-wrap">
                <!-- Left: Case Details -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_8-of-12">
                    <lightning-card title="Case Details">
                        <div class="slds-p-around_medium">
                            <dl class="slds-dl_horizontal">
                                <dt class="slds-dl_horizontal__label">Status</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-badge label={caseRecord.Status}></lightning-badge>
                                </dd>
                                <dt class="slds-dl_horizontal__label">Priority</dt>
                                <dd class="slds-dl_horizontal__detail">{caseRecord.Priority}</dd>
                                <dt class="slds-dl_horizontal__label">Affected Module</dt>
                                <dd class="slds-dl_horizontal__detail">{caseRecord.Affected_Module__c}</dd>
                                <dt class="slds-dl_horizontal__label">Urgency</dt>
                                <dd class="slds-dl_horizontal__detail">{caseRecord.Urgency__c}</dd>
                                <dt class="slds-dl_horizontal__label">SLA Tier</dt>
                                <dd class="slds-dl_horizontal__detail">{caseRecord.SLA_Tier_at_Creation__c}</dd>
                                <dt class="slds-dl_horizontal__label">Created</dt>
                                <dd class="slds-dl_horizontal__detail">
                                    <lightning-formatted-date-time
                                        value={caseRecord.CreatedDate}
                                        year="numeric" month="short" day="2-digit">
                                    </lightning-formatted-date-time>
                                </dd>
                            </dl>

                            <div class="slds-m-top_medium">
                                <h3 class="slds-text-heading_small slds-m-bottom_small">Description</h3>
                                <p class="slds-text-body_regular case-description">{caseRecord.Description}</p>
                            </div>

                            <template if:true={caseRecord.Resolution_Summary__c}>
                                <div class="slds-m-top_medium slds-box slds-theme_success">
                                    <h3 class="slds-text-heading_small slds-m-bottom_small">Resolution Summary</h3>
                                    <p class="slds-text-body_regular">{caseRecord.Resolution_Summary__c}</p>
                                </div>
                            </template>
                        </div>
                    </lightning-card>
                </div>

                <!-- Right: Quick Actions -->
                <div class="slds-col slds-size_1-of-1 slds-large-size_4-of-12">
                    <lightning-card title="Actions">
                        <div class="slds-p-around_medium">
                            <p class="slds-text-body_small slds-m-bottom_medium">
                                Need to escalate or add more information?
                            </p>
                            <lightning-button
                                label="Contact Support"
                                variant="brand"
                                class="slds-m-bottom_small"
                                onclick={handleContactSupport}>
                            </lightning-button>
                            <lightning-button
                                label="Open New Case"
                                onclick={handleNewCase}>
                            </lightning-button>
                        </div>
                    </lightning-card>
                </div>
            </div>
        </template>
    </div>
</template>
