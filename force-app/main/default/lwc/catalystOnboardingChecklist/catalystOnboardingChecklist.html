<template>
    <lightning-card title="Onboarding Checklist" icon-name="standard:task2">
        <div class="slds-p-around_medium catalyst-onboarding-checklist">

            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading onboarding" size="small"></lightning-spinner>
            </template>

            <template if:true={onboarding}>
                <!-- Progress Bar -->
                <div class="slds-m-bottom_medium">
                    <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                        <div class="slds-col">
                            <p class="slds-text-body_small slds-text-color_weak">
                                {completedCount} of {totalSteps} steps complete
                            </p>
                        </div>
                        <div class="slds-col slds-no-flex">
                            <span class="slds-text-body_small slds-text-color_weak">{progressPct}%</span>
                        </div>
                    </div>
                    <lightning-progress-bar value={progressPct} size="medium"></lightning-progress-bar>
                </div>

                <!-- Step List -->
                <ul>
                    <template for:each={steps} for:item="step">
                        <li key={step.stepNumber} class="slds-item catalyst-step slds-p-vertical_small">
                            <div class="slds-grid slds-grid_vertical-align-center">
                                <!-- Checkbox -->
                                <div class="slds-col slds-no-flex slds-m-right_small">
                                    <lightning-input
                                        type="checkbox"
                                        label={step.label}
                                        variant="label-hidden"
                                        checked={step.isComplete}
                                        data-step={step.stepNumber}
                                        onchange={handleStepToggle}>
                                    </lightning-input>
                                </div>
                                <!-- Step info -->
                                <div class="slds-col">
                                    <p class={step.labelClass}>{step.label}</p>
                                    <p class="slds-text-body_small slds-text-color_weak">{step.description}</p>
                                </div>
                                <!-- Resource link -->
                                <div class="slds-col slds-no-flex">
                                    <a href={step.resourceUrl}
                                       class="slds-text-link slds-text-body_small"
                                       target="_self"
                                       aria-label={step.resourceLabel}>
                                        Guide
                                    </a>
                                </div>
                            </div>
                        </li>
                    </template>
                </ul>

                <template if:true={isComplete}>
                    <div class="slds-m-top_medium slds-box slds-theme_success slds-text-align_center">
                        <lightning-icon icon-name="action:approval" size="small" class="slds-m-right_x-small"></lightning-icon>
                        <span class="slds-text-body_regular">Onboarding complete! You're all set.</span>
                    </div>
                </template>
            </template>

            <template if:true={noData}>
                <p class="slds-text-body_small slds-text-color_weak">No active onboarding project found.</p>
            </template>
        </div>
    </lightning-card>
</template>
