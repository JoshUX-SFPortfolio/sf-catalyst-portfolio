<template>
    <div class="catalyst-knowledge-article slds-p-around_medium">

        <!-- Loading -->
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading article" size="medium"></lightning-spinner>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                <h2>{error}</h2>
            </div>
        </template>

        <!-- Article -->
        <template if:true={article}>
            <!-- Breadcrumb -->
            <nav role="navigation" aria-label="Breadcrumbs" class="slds-m-bottom_medium">
                <ol class="slds-breadcrumb slds-list_horizontal slds-wrap">
                    <li class="slds-breadcrumb__item">
                        <a href="/knowledge" class="slds-text-link">Knowledge Base</a>
                    </li>
                    <li class="slds-breadcrumb__item" aria-current="page">
                        {article.Title}
                    </li>
                </ol>
            </nav>

            <!-- Article Header -->
            <div class="slds-m-bottom_medium">
                <h1 class="slds-text-heading_large">{article.Title}</h1>
                <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">
                    Article #{article.ArticleNumber} &middot; Last updated:
                    <lightning-formatted-date-time
                        value={lastPublishedIso}
                        year="numeric" month="long" day="2-digit">
                    </lightning-formatted-date-time>
                </p>
            </div>

            <!-- Summary -->
            <template if:true={article.Summary}>
                <div class="slds-box slds-theme_shade slds-m-bottom_medium">
                    <p class="slds-text-body_regular">{article.Summary}</p>
                </div>
            </template>

            <!-- Body -->
            <div class="article-body slds-m-bottom_large">
                <lightning-formatted-rich-text value={article.ArticleBody}></lightning-formatted-rich-text>
            </div>

            <!-- Footer -->
            <div class="slds-grid slds-grid_vertical-align-center slds-m-top_large catalyst-article-footer">
                <div class="slds-col">
                    <p class="slds-text-body_small">Did this article help?</p>
                </div>
                <div class="slds-col slds-no-flex">
                    <lightning-button-group>
                        <lightning-button label="Yes" icon-name="utility:like" onclick={handleHelpful}></lightning-button>
                        <lightning-button label="No" icon-name="utility:dislike" onclick={handleNotHelpful}></lightning-button>
                    </lightning-button-group>
                </div>
            </div>

            <template if:true={feedbackSent}>
                <p class="slds-text-body_small slds-text-color_success slds-m-top_small">
                    Thank you for your feedback.
                </p>
            </template>
        </template>
    </div>
</template>
